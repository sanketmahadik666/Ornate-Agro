name: ornate_agro
description: Vendor Seed Distribution Management - track farmers, seed distribution, yield returns, and farmer classification.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  # Local DB & sync (Req 10)
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  # Auth & security
  flutter_secure_storage: ^9.0.0
  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1
  connectivity_plus: ^5.0.2
  # PDF/CSV export (Req 7)
  pdf: ^3.10.7
  csv: ^5.1.1
  share_plus: ^7.2.1
  # File picker for input sheets
  file_picker: ^6.1.1
  # Excel parsing
  excel: ^3.0.0
  # CSV parsing (already have csv package)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
